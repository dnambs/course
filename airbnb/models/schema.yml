models:
  - name: dim_listings_cleansed
    description: Cleansed table which contains Airbnb listings.
    data_tests:
     - minimum_row_count:
        arguments:
          min_row_count: 1000
    
    columns:
     - name: listing_id
       description: Primary key for the listing
       data_tests:
        - unique
        - not_null

     - name: host_id
       description: The host's id. References the host table.
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       description: Type of the apartment / room
       data_tests:
        - accepted_values:
            arguments:
              values: ['Entire home/apt',
                       'Private room',
                       'Shared room',
                       'Hotel room']  

     - name: minimum_nights
       description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
       data_tests:
            - positive_values

  - name: dim_hosts_cleansed
    description: This contains cleansed Airbnb host data.
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        description: A unique id for each Airbnb host.
        data_type: integer
      - name: host_name
        description: The name of each Airbnb host.
        data_type: string
      - name: is_superhost
        description: This indicates if a host is a superhost.
        data_type: string
      - name: updated_at
        description: This indicates when the data was updated.
        data_type: timestamp
      - name: created_at
        description: This indicates when the record was created.
        data_type: timestamp
